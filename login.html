<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول | منصة ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/ksu1.png" alt="شعار المنصة" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
                    <a href="seeker-login.html" class="nav-link" data-i18n="nav.seekers"></a>
                    <a href="employer-login.html" class="nav-link" data-i18n="nav.employers"></a>
                    <a href="jobs.html" class="nav-link" data-i18n="nav.jobs"></a>
                    <a href="course-access.html" class="nav-link" data-i18n="nav.courses"></a>
                </nav>
            </div>

            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
            </div>

            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <h1 class="auth-title" data-i18n="page.generic.login.title">تسجيل الدخول</h1>
                <p class="auth-subtitle">ادخل بياناتك وسيتم تحويلك تلقائيًا حسب نوع الحساب.</p>

                <form id="genericLoginForm" novalidate>
                    <div class="auth-form-group">
                        <label for="loginEmail" data-i18n="form.email.label">البريد الإلكتروني</label>
                        <input id="loginEmail" type="email" autocomplete="email" required data-i18n-placeholder="form.email.placeholder" placeholder="example@domain.com" />
                    </div>
                    <div class="auth-form-group">
                        <label for="loginPassword" data-i18n="form.password.label">كلمة المرور</label>
                        <input id="loginPassword" type="password" autocomplete="current-password" required data-i18n-placeholder="form.password.placeholder" placeholder="••••••••" />
                    </div>

                    <div class="auth-submit">
                        <button type="submit" class="btn btn-primary btn-full" data-i18n="form.login.submit">تسجيل الدخول</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div>
                <h3 class="footer-logo">ماهر</h3>
            </div>
            <div class="footer-copy">
                <span data-i18n="footer.copy">© <span id="year"></span> ماهر. جميع الحقوق محفوظة.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
