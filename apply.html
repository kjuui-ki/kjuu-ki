<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التقديم على وظيفة | منصة ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/ksu1.png" alt="شعار المنصة" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
                    <a href="seeker-login.html" class="nav-link" data-i18n="nav.seekers"></a>
                    <a href="employer-login.html" class="nav-link" data-i18n="nav.employers"></a>
                    <a href="jobs.html" class="nav-link" data-i18n="nav.jobs"></a>
                    <a href="course-access.html" class="nav-link" data-i18n="nav.courses"></a>
                </nav>
            </div>

            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
            </div>

            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="section">
        <div class="container apply-page">
            <div class="apply-shell">
                <div class="apply-card">
                    <div class="apply-job-summary" id="applyJobSummary">
                        <h1 data-i18n="page.apply.title">التقديم على وظيفة</h1>
                        <p data-i18n="page.apply.text">سيتم عرض تفاصيل الوظيفة هنا ثم يمكنك إرسال طلبك مباشرة.</p>
                    </div>

                    <form id="jobApplyForm">
                        <div class="apply-form-grid">
                            <div class="apply-form-group full-width">
                                <label for="fullName">الاسم الكامل</label>
                                <input id="fullName" type="text" placeholder="اكتب اسمك الكامل" autocomplete="name" />
                            </div>

                            <div class="apply-form-group">
                                <label for="phone">رقم الجوال</label>
                                <input id="phone" type="tel" placeholder="05XXXXXXXX" autocomplete="tel" />
                            </div>

                            <div class="apply-form-group">
                                <label for="specialization">التخصص</label>
                                <input id="specialization" type="text" placeholder="مثال: تقنية المعلومات" />
                            </div>

                            <div class="apply-form-group full-width">
                                <label for="skills">المهارات</label>
                                <textarea id="skills" placeholder="اذكر أهم مهاراتك وخبراتك بشكل مختصر"></textarea>
                            </div>

                            <div class="apply-form-group full-width">
                                <label for="cvFile">رفع ملف CV</label>
                                <div class="file-input-box">
                                    <input id="cvFile" type="file" accept=".pdf,.doc,.docx" />
                                </div>
                            </div>
                        </div>

                        <div id="applyFormStatus" class="form-status" style="display: none;"></div>

                        <div class="apply-actions">
                            <button type="submit" id="submitApplicationBtn" class="btn btn-primary apply-submit">إرسال الطلب</button>
                        </div>
                    </form>

                    <p class="page-note">يُسمح بطلب واحد فقط لكل وظيفة، وسيتم حفظه بحالة pending.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div>
                <h3 class="footer-logo" data-i18n="footer.logo">ماهر</h3>
            </div>
            <div class="footer-copy">
                <span data-i18n="footer.copy">© <span id="year"></span> ماهر. جميع الحقوق محفوظة.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/apply-page.js"></script>
</body>
</html>
