<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اختيار نوع الدخول إلى الدورات | منصة ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />

<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/logo.png" alt="شعار ماهر" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
                    <a href="seeker-login.html" class="nav-link" data-i18n="nav.seekers"></a>
                    <a href="employer-login.html" class="nav-link" data-i18n="nav.employers"></a>
                    <a href="jobs.html" class="nav-link" data-i18n="nav.jobs"></a>
                    <a href="course-access.html" class="nav-link" data-i18n="nav.courses"></a>
                </nav>
            </div>

            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
            </div>

            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="course-access-page">
        <div class="container">
            <div class="course-access-header">
                <h1 data-i18n="page.courseAccess.title">اختر نوع الدخول إلى الدورات التدريبية</h1>
                <p data-i18n="page.courseAccess.subtitle">اختر نوع الحساب الذي تود استخدامه للدخول إلى الدورات.</p>
            </div>

            <div class="course-access-grid">
                <button type="button" class="course-access-card" id="courseAccessSeeker">
                    <h3 data-i18n="page.courseAccess.seeker.title">باحث عن عمل</h3>
                    <p data-i18n="page.courseAccess.seeker.text">الدخول إلى الدورات كباحث عن عمل.</p>
                </button>

                <button type="button" class="course-access-card" id="courseAccessEmployer">
                    <h3 data-i18n="page.courseAccess.employer.title">شركة</h3>
                    <p data-i18n="page.courseAccess.employer.text">الدخول إلى الدورات كصاحب عمل أو شركة.</p>
                </button>
            </div>
        </div>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div>
                <h3 class="footer-logo" data-i18n="footer.logo">ماهر</h3>
                <p data-i18n="footer.about">منصة عربية للتوظيف والتدريب وتطوير المهارات.</p>
            </div>
            <div class="footer-links">
                <a href="jobs.html" data-i18n="footer.jobs">الوظائف</a>
                <a href="course-access.html" data-i18n="footer.courses">الدورات</a>
                <a href="contact.html" data-i18n="footer.contact">تواصل معنا</a>

            <div class="footer-copy">
                <span data-i18n="footer.copy">© <span id="year"></span> ماهر. جميع الحقوق محفوظة.</span>
