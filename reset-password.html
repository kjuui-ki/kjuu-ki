<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إعادة تعيين كلمة المرور | منصة ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/ksu1.png" alt="شعار المنصة" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
                    <a href="seeker-login.html" class="nav-link" data-i18n="nav.seekers"></a>
                    <a href="employer-login.html" class="nav-link" data-i18n="nav.employers"></a>
                    <a href="jobs.html" class="nav-link" data-i18n="nav.jobs"></a>
                    <a href="course-access.html" class="nav-link" data-i18n="nav.courses"></a>
                </nav>
            </div>

            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
            </div>

            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <h1 class="auth-title">إعادة تعيين كلمة المرور</h1>
                <p class="auth-subtitle">أدخل كلمة المرور الجديدة لتحديث حسابك.</p>

                <form id="resetPasswordForm">
                    <div class="auth-form-group">
                        <label for="newPassword">كلمة المرور الجديدة</label>
                        <input id="newPassword" type="password" placeholder="••••••••" />
                    </div>
                    <div class="auth-form-group">
                        <label for="confirmPassword">تأكيد كلمة المرور</label>
                        <input id="confirmPassword" type="password" placeholder="••••••••" />
                    </div>

                    <div id="resetPasswordStatus" class="form-status" style="display:none;"></div>

                    <div class="auth-submit">
                        <button id="resetPasswordBtn" type="submit" class="btn btn-primary btn-full">تغيير كلمة المرور</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div>
                <h3 class="footer-logo" data-i18n="footer.logo">ماهر</h3>
                <p data-i18n="footer.about">منصة عربية للتوظيف والتدريب وتطوير المهارات.</p>
            </div>
            <div class="footer-links">
                <a href="jobs.html" data-i18n="footer.jobs">الوظائف</a>
                <a href="course-access.html" data-i18n="footer.courses">الدورات</a>
                <a href="contact.html" data-i18n="footer.contact">تواصل معنا</a>
            </div>
            <div class="footer-copy">
                <span data-i18n="footer.copy">© <span id="year"></span> ماهر. جميع الحقوق محفوظة.</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/reset-password.js"></script>
</body>
</html>
