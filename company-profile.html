<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/ksu1.png" alt="شعار المنصة" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>

            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>

            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="section profile-page">
        <div class="container">
            <h1>ملف الشركة</h1>
            <p class="section-intro">قم بتحديث بيانات شركتك الأساسية.</p>

            <div class="auth-card">
                <form id="companyProfileForm" class="profile-form">
                    <div class="auth-form-group">
                        <label for="companyName">اسم الشركة</label>
                        <input id="companyName" type="text" placeholder="اسم الشركة" />
                    </div>
                    <div class="auth-form-group">
                        <label for="companyPhone">رقم التواصل</label>
                        <input id="companyPhone" type="tel" placeholder="مثال: 05XXXXXXXX" />
                    </div>
                    <div class="auth-form-group">
                        <label for="companySpecialization">مجال العمل / التخصص</label>
                        <input id="companySpecialization" type="text" placeholder="مثال: تقنية، تعليم، خدمات" />
                    </div>
                    <div class="auth-form-group">
                        <label for="companyServices">نبذة وخدمات الشركة</label>
                        <textarea id="companyServices" rows="3" placeholder="اكتب وصفًا مختصرًا عن الشركة والخدمات"></textarea>
                    </div>

                    <div class="auth-submit">
                        <button type="submit" class="btn btn-primary btn-full">حفظ</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <img src="assets/images/ksu1.png" alt="شعار ماهر" class="footer-logo-img">
                    <h3 class="footer-logo" data-i18n="footer.logo">ماهر</h3>
                    <p class="footer-about" data-i18n="footer.about">منصة عربية للتوظيف والتدريب وتطوير المهارات.</p>
                    <a class="footer-site-link" href="https://www.maher.edu.sa" target="_blank" rel="noopener">🌐 www.maher.edu.sa</a>
                </div>
                <div class="footer-col">
                    <h4 class="footer-col-title" data-i18n="footer.quickLinks">روابط سريعة</h4>
                    <div class="footer-links">
                        <a href="jobs.html" data-i18n="footer.jobs">الوظائف</a>
                        <a href="course-access.html" data-i18n="footer.courses">الدورات</a>
                        <a href="contact.html" data-i18n="footer.contact">تواصل معنا</a>
                    </div>
                </div>
                <div class="footer-col">
                    <h4 class="footer-col-title" data-i18n="footer.contact">تواصل معنا</h4>
                    <ul class="footer-contact-list">
                        <li>📞 <a href="tel:920016798">920016798</a> <span class="footer-contact-note" data-i18n="footer.landline">(أرضي)</span></li>
                        <li>📱 <a href="tel:0539600050">0539600050</a></li>
                        <li>📱 <a href="tel:0539600080">0539600080</a></li>
                        <li>✉️ <a href="mailto:info@maher.edu.sa">info@maher.edu.sa</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <span data-i18n="footer.copy">© <span id="year"></span> ماهر. جميع الحقوق محفوظة.</span>
            </div>
        </div>
    </footer>
